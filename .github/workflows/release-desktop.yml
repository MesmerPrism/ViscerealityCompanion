name: Release Windows Companion

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without the leading v (example: 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025-vs2026
    env:
      PACKAGE_ID: MesmerPrism.ViscerealityCompanion
      PACKAGE_DISPLAY_NAME: Viscereality Companion
      PACKAGE_PUBLISHER_DISPLAY_NAME: Mesmer Prism
      PACKAGE_FILE_NAME: ViscerealityCompanion.msix
      SETUP_FILE_NAME: ViscerealityCompanion-Setup.exe
      APPINSTALLER_FILE_NAME: ViscerealityCompanion.appinstaller
      CERTIFICATE_FILE_NAME: ViscerealityCompanion.cer
      APPINSTALLER_URI: https://github.com/${{ github.repository }}/releases/latest/download/ViscerealityCompanion.appinstaller
      MAIN_PACKAGE_URI: https://github.com/${{ github.repository }}/releases/latest/download/ViscerealityCompanion.msix

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.201

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tagName = 'v${{ inputs.version }}'
            $semVer = '${{ inputs.version }}'
          }
          else {
            $tagName = '${{ github.ref_name }}'
            if ($tagName -match '^v(?<SemVer>\d+\.\d+\.\d+)$') {
              $semVer = $Matches.SemVer
            }
            else {
              throw "Expected a tag like v0.1.0, got $tagName"
            }
          }

          if ($semVer -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must look like 0.1.0, got $semVer"
          }

          $packageVersion = "$semVer.0"
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_version=$packageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate signing configuration
        shell: pwsh
        env:
          WINDOWS_PACKAGE_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_PACKAGE_CERTIFICATE_BASE64 }}
          WINDOWS_PACKAGE_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_PACKAGE_CERTIFICATE_PASSWORD }}
          WINDOWS_PACKAGE_PUBLISHER: ${{ secrets.WINDOWS_PACKAGE_PUBLISHER }}
          WINDOWS_SETUP_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64 }}
          WINDOWS_SETUP_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_PREVIEW_SETUP_CERTIFICATE_PASSWORD }}
        run: |
          $missing = @()
          foreach ($name in 'WINDOWS_PACKAGE_CERTIFICATE_BASE64', 'WINDOWS_PACKAGE_CERTIFICATE_PASSWORD', 'WINDOWS_PACKAGE_PUBLISHER') {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            throw "Missing required release secret(s): $($missing -join ', ')"
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SETUP_CERTIFICATE_BASE64)) {
            throw "Missing guided-setup signing certificate secret WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64. Export the shared MesmerPrism signer with tools/app/New-Preview-SigningCertificate.ps1 -ExistingThumbprint 08A5878AD6E652A94517D2C79144EB2655B0088C and configure the repo secrets before publishing."
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SETUP_CERTIFICATE_PASSWORD)) {
            throw "Missing guided-setup signing certificate secret WINDOWS_PREVIEW_SETUP_CERTIFICATE_PASSWORD."
          }

          if ($env:WINDOWS_SETUP_CERTIFICATE_BASE64 -eq $env:WINDOWS_PACKAGE_CERTIFICATE_BASE64) {
            Write-Host 'Guided setup signing is configured to reuse the shared MesmerPrism signer already used by older working releases and the sibling DOPE Companion repo.' -ForegroundColor Yellow
          }
          else {
            Write-Host 'Dedicated guided-setup signing certificate detected.' -ForegroundColor Green
          }

      - name: Restore
        run: dotnet restore ViscerealityCompanion.sln

      - name: Build
        run: dotnet build ViscerealityCompanion.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ViscerealityCompanion.sln --configuration Release --no-build

      - name: Publish app
        run: >
          dotnet publish src/ViscerealityCompanion.App/ViscerealityCompanion.App.csproj
          --configuration Release
          --runtime win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          --output artifacts/app-win-x64

      - name: Publish CLI
        run: >
          dotnet publish src/ViscerealityCompanion.Cli/ViscerealityCompanion.Cli.csproj
          --configuration Release
          --runtime win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          --output artifacts/cli-win-x64

      - name: Decode signing certificate
        id: certificate
        shell: pwsh
        env:
          WINDOWS_PACKAGE_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_PACKAGE_CERTIFICATE_BASE64 }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'ViscerealityCompanion-signing.pfx'
          $certificateBytes = [Convert]::FromBase64String($env:WINDOWS_PACKAGE_CERTIFICATE_BASE64)
          [IO.File]::WriteAllBytes($certificatePath, $certificateBytes)
          "path=$certificatePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Decode guided-setup signing certificate
        id: setup_certificate
        shell: pwsh
        env:
          WINDOWS_SETUP_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64 }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'ViscerealityCompanion-setup-signing.pfx'
          $certificateBytes = [Convert]::FromBase64String($env:WINDOWS_SETUP_CERTIFICATE_BASE64)
          [IO.File]::WriteAllBytes($certificatePath, $certificateBytes)
          "path=$certificatePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build signed Windows package
        shell: pwsh
        env:
          WINDOWS_PACKAGE_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_PACKAGE_CERTIFICATE_PASSWORD }}
          WINDOWS_PACKAGE_PUBLISHER: ${{ secrets.WINDOWS_PACKAGE_PUBLISHER }}
          WINDOWS_PACKAGE_TIMESTAMP_URL: ${{ vars.WINDOWS_PACKAGE_TIMESTAMP_URL }}
        run: |
          $args = @(
            '-Configuration', 'Release',
            '-Version', '${{ steps.version.outputs.package_version }}',
            '-PackageId', $env:PACKAGE_ID,
            '-Publisher', $env:WINDOWS_PACKAGE_PUBLISHER,
            '-DisplayName', $env:PACKAGE_DISPLAY_NAME,
            '-PublisherDisplayName', $env:PACKAGE_PUBLISHER_DISPLAY_NAME,
            '-PackageFileName', $env:PACKAGE_FILE_NAME,
            '-AppInstallerFileName', $env:APPINSTALLER_FILE_NAME,
            '-CertificateFileName', $env:CERTIFICATE_FILE_NAME,
            '-AppInstallerUri', $env:APPINSTALLER_URI,
            '-MainPackageUri', $env:MAIN_PACKAGE_URI,
            '-PackageCertificatePath', '${{ steps.certificate.outputs.path }}',
            '-PackageCertificatePassword', $env:WINDOWS_PACKAGE_CERTIFICATE_PASSWORD
          )

          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_PACKAGE_TIMESTAMP_URL)) {
            $args += @('-PackageCertificateTimestampUrl', $env:WINDOWS_PACKAGE_TIMESTAMP_URL)
          }

          & powershell -ExecutionPolicy Bypass -File .\tools\app\Build-App-Package.ps1 @args

      - name: Publish guided setup bootstrapper
        shell: pwsh
        env:
          WINDOWS_SETUP_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_PREVIEW_SETUP_CERTIFICATE_PASSWORD }}
          WINDOWS_PACKAGE_TIMESTAMP_URL: ${{ vars.WINDOWS_PACKAGE_TIMESTAMP_URL }}
          WINDOWS_SETUP_TIMESTAMP_URL: ${{ vars.WINDOWS_PREVIEW_SETUP_TIMESTAMP_URL }}
        run: |
          $setupCertificatePath = '${{ steps.setup_certificate.outputs.path }}'
          $setupCertificatePassword = $env:WINDOWS_SETUP_CERTIFICATE_PASSWORD
          $setupTimestampUrl = $env:WINDOWS_PACKAGE_TIMESTAMP_URL

          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_SETUP_TIMESTAMP_URL)) {
            $setupTimestampUrl = $env:WINDOWS_SETUP_TIMESTAMP_URL
          }

          & powershell -ExecutionPolicy Bypass -File .\tools\app\Publish-PreviewSetup.ps1 `
            -Version '${{ steps.version.outputs.package_version }}' `
            -FileName $env:SETUP_FILE_NAME `
            -PackageCertificatePath $setupCertificatePath `
            -PackageCertificatePassword $setupCertificatePassword `
            -PackageCertificateTimestampUrl $setupTimestampUrl

      - name: Validate published App Installer identity
        shell: pwsh
        run: |
          [xml]$appInstaller = Get-Content "artifacts\windows-installer\$env:APPINSTALLER_FILE_NAME"
          $mainPackage = $appInstaller.AppInstaller.MainPackage
          if ($mainPackage.Name -ne $env:PACKAGE_ID) {
            throw "Published App Installer points at package $($mainPackage.Name), expected $env:PACKAGE_ID"
          }

      - name: Validate release asset signatures
        shell: pwsh
        env:
          WINDOWS_PACKAGE_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_PACKAGE_CERTIFICATE_BASE64 }}
          WINDOWS_SETUP_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64 }}
        run: |
          $args = @(
            '-PreviewSetupPath', "artifacts\windows-installer\$env:SETUP_FILE_NAME",
            '-PackagePath', "artifacts\windows-installer\$env:PACKAGE_FILE_NAME",
            '-AllowSelfSignedPackage'
          )

          if ($env:WINDOWS_SETUP_CERTIFICATE_BASE64 -eq $env:WINDOWS_PACKAGE_CERTIFICATE_BASE64) {
            $args += '-AllowSelfSignedPreviewSetup'
          }

          & powershell -ExecutionPolicy Bypass -File .\tools\app\Test-ReleaseAssetSigning.ps1 @args

      - name: Package portable release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\windows-installer | Out-Null
          Compress-Archive -Path artifacts\app-win-x64\* -DestinationPath artifacts\windows-installer\ViscerealityCompanion-win-x64.zip
          Compress-Archive -Path artifacts\cli-win-x64\* -DestinationPath artifacts\windows-installer\viscereality-cli-win-x64.zip

      - name: Write SHA256 sums
        shell: pwsh
        run: |
          $files = @(
            (Join-Path $PWD "artifacts\windows-installer\$env:SETUP_FILE_NAME"),
            (Join-Path $PWD "artifacts\windows-installer\$env:PACKAGE_FILE_NAME"),
            (Join-Path $PWD "artifacts\windows-installer\$env:APPINSTALLER_FILE_NAME"),
            (Join-Path $PWD "artifacts\windows-installer\$env:CERTIFICATE_FILE_NAME"),
            (Join-Path $PWD 'artifacts\windows-installer\ViscerealityCompanion-win-x64.zip'),
            (Join-Path $PWD 'artifacts\windows-installer\viscereality-cli-win-x64.zip')
          )

          Get-FileHash -Path $files -Algorithm SHA256 |
            ForEach-Object { '{0} *{1}' -f $_.Hash.ToLowerInvariant(), [IO.Path]::GetFileName($_.Path) } |
            Set-Content -Path (Join-Path $PWD 'artifacts\windows-installer\SHA256SUMS.txt') -Encoding utf8

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ViscerealityCompanion-windows-release
          path: artifacts/windows-installer

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = '${{ steps.version.outputs.tag_name }}'
          $releaseTitle = "Viscereality Companion Sussex-Focused Research Release ${{ steps.version.outputs.package_version }}"
          $assets = @(
            "artifacts\windows-installer\$env:SETUP_FILE_NAME",
            "artifacts\windows-installer\$env:PACKAGE_FILE_NAME",
            "artifacts\windows-installer\$env:APPINSTALLER_FILE_NAME",
            "artifacts\windows-installer\$env:CERTIFICATE_FILE_NAME",
            'artifacts\windows-installer\ViscerealityCompanion-win-x64.zip',
            'artifacts\windows-installer\viscereality-cli-win-x64.zip',
            'artifacts\windows-installer\SHA256SUMS.txt'
          )

          gh release view $tagName *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tagName $assets --clobber
          }
          else {
            gh release create $tagName $assets --title $releaseTitle --generate-notes --latest --target $env:GITHUB_SHA
          }

      - name: Remove signing certificate
        if: always()
        shell: pwsh
        run: |
          if (Test-Path '${{ steps.certificate.outputs.path }}') {
            Remove-Item -Force '${{ steps.certificate.outputs.path }}'
          }

          $setupCertificatePath = '${{ steps.setup_certificate.outputs.path }}'
          if (-not [string]::IsNullOrWhiteSpace($setupCertificatePath) -and (Test-Path $setupCertificatePath)) {
            Remove-Item -Force $setupCertificatePath
          }
