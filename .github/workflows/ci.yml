name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ViscerealityCompanion.sln

      - name: Build
        run: dotnet build ViscerealityCompanion.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ViscerealityCompanion.sln --configuration Release --no-build

      - name: CLI smoke test
        run: dotnet run --project src/ViscerealityCompanion.Cli --configuration Release -- --help

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install docs dependencies
        run: npm ci

      - name: Build GitHub Pages site
        run: npm run pages:build
